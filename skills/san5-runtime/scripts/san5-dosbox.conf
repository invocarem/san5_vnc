[dosbox]
machine=svga_s3
memsize=16

[sdl]
# autolock=false: VNC sends absolute pointer position; true locks relative motion (cursor looks stuck)
fullscreen=false
fulldouble=false
fullresolution=1024x768
windowresolution=800x600
output=surface
autolock=false
sensitivity=100
waitonerror=true
priority=higher,normal
midimode=0
dosx=false
autoexec

[dos]
xms=true
ems=true
umb=true
keyboardlayout=auto

[render]
scaler=normal2x
aspect=false

[cpu]
core=auto
cputype=auto
cycles=auto
cycleup=10
cycledown=20

[mixer]
rate=22050
blocksize=2048
prebuffer=10

[midi]
mpu401=none

[sblaster]
sbtype=sb16
sbbase=220
irq=7
dma=1
hdma=5
sbmixer=true
oplmode=auto
oplemu=default
oplrate=22050

[gus]
gus=false

[joystick]
joysticktype=none
timed=false
autofire=false
swap34=false
buttonwrap=false

[serial]
serial1=dummy
serial2=dummy
serial3=dummy
serial4=dummy

[autoexec]
# Your mounts go here
mount c /home/chenchen/Games/san5
mount d /home/chenchen/Games/san5 -t cdrom -label SAN5
c:
cls
echo DOSBox ready for VNC

